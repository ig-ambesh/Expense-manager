<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/dashboard.css" />
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <!-- <h2>FinTrack Pro</h2> -->
        <img src="assets/2_49.svg" alt="sorry" id="logo" />

        <nav>
          <a href="#">Dashboard</a>
          <a href="#" id="settingsBtn">Settings</a>
          <a href="#" id="logoutBtn">LogOut</a>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <input type="text" placeholder="Search..." />

          <div class="top-right">
            <span id="greeting"></span>

            <div id="icon">
              <i class="ri-moon-line"></i>
            </div>
          </div>
        </header>

        <section class="cards">
          <div class="card" id="bal-color">
            <h3>Balance</h3>
            <p id="balance">₹0</p>
          </div>

          <div class="card" id="in-color">
            <h3>Income</h3>
            <p id="income">₹0</p>
          </div>

          <div class="card" id="exp-color">
            <h3>Expense</h3>
            <p id="expense">₹0</p>
          </div>

          <div class="card" id="tra-color">
            <h3>Transactions</h3>
            <p id="totalTransaction">0</p>
          </div>
        </section>

        <section class="chart">
          <canvas id="expenseChart"></canvas>
        </section>

        <button id="addBtn">+ Add Transaction</button>

        <!-- Add Transaction Details -->

        <div id="popup">
          <div id="popupBox">
            <div class="heading">
              <h2>Add Transaction</h2>
              <span id="closeBtn">X</span>
            </div>

            <form id="transactionForm">
              <label>Type</label>

              <select id="type">
                <option value="">Select Type</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>

              <label>Amount</label>
              <input type="number" id="amount" />

              <label>Category</label>
              <select id="category" required>
                <option value="">Select Category</option>

                <option>🍔 Food</option>
                <option>🚕 Transport</option>
                <option>🎮 Entertainment</option>
                <option>📚 Education</option>
                <option>🏠 Rent</option>
                <option>💻 Freelancing</option>
                <option>🛒 Shopping</option>
              </select>

              <label>Description</label>
              <input type="text" id="description" />

              <label>Date</label>
              <input type="date" id="date" />

              <div class="btnBox">
                <button type="button" id="cancelBtn">Cancel</button>

                <button type="submit">Add</button>
              </div>
            </form>
          </div>
        </div>

        <!-- Transaction Table -->

        <section class="table-section">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Category</th>
                <th>Amount</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </section>
      </main>
    </div>

    <div id="settingsPopup">
      <div id="settingsBox">
        <div class="settingsHeader">
          <h2>Settings</h2>
          <span id="closeSettings">✕</span>
        </div>

        <label>Change Name</label>
        <input type="text" id="newName" />

        <label>Currency</label>

        <select id="currency">
          <option value="₹">₹ INR</option>
          <option value="$">$ USD</option>
          <option value="€">€ EUR</option>
          <option value="£">£ GBP</option>
        </select>

        <button id="saveSettings">Save</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
